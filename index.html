<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dětské hry zdarma</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 30px;
      background: linear-gradient(#87cefa, #c8f0ff);
      overflow-x: hidden;
      position: relative;
    }

    .cloud {
      position: absolute;
      color: white;
      font-size: 70px;
      opacity: 0.8;
    }

    .cloud1 {
      top: 20px;
      left: 80px;
    }

    .cloud2 {
      top: 120px;
      right: 120px;
    }

    .butterfly {
      position: absolute;
      font-size: 40px;
      animation: fly 6s infinite ease-in-out;
    }

    .b1 {
      top: 220px;
      left: 100px;
    }

    .b2 {
      top: 500px;
      right: 120px;
      animation-delay: 2s;
    }

    @keyframes fly {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(10deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

    h1 {
      color: #ff5a5a;
      font-size: 55px;
      margin-bottom: 10px;
      position: relative;
      z-index: 2;
    }

    .intro {
      font-size: 24px;
      color: #333;
      margin-bottom: 40px;
      position: relative;
      z-index: 2;
    }

    .box {
      background: white;
      max-width: 500px;
      margin: 40px auto;
      padding: 30px;
      border-radius: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      position: relative;
      z-index: 2;
    }

    p {
      font-size: 24px;
      color: #333;
    }

    button {
      background: #ffd93d;
      border: none;
      padding: 18px 28px;
      border-radius: 18px;
      font-size: 24px;
      cursor: pointer;
      margin: 8px;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.08);
      background: #ffcb05;
    }

    #score {
      margin-top: 20px;
      font-size: 42px;
      color: #00a651;
      font-weight: bold;
    }

    #animal {
      font-size: 70px;
      margin: 20px 0;
    }

    #colorCircle {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      margin: 20px auto;
    }

    #result, #colorResult {
      margin-top: 20px;
      font-size: 30px;
      font-weight: bold;
      color: #007700;
    }
  </style>
</head>
<body>

  <div class="cloud cloud1">☁️</div>
  <div class="cloud cloud2">☁️</div>

  <div class="butterfly b1">🦋</div>
  <div class="butterfly b2">🦋</div>

  <h1>🎮 Dětské hry zdarma</h1>

  <div class="intro">
    Vítej! Zahraj si hry a nauč se něco nového 😊
  </div>

  <div class="box">
    <p>Klikni na tlačítko a sbírej body!</p>

    <button onclick="addPoint()">Klikni sem 😊</button>

    <div id="score">0</div>
  </div>

  <div class="box" id="animalGame">
    <p>Jaké je to zvíře?</p>

    <div id="animal">🐶</div>

    <button onclick="answer('Kočka')">Kočka</button>
    <button onclick="answer('Pes')">Pes</button>
    <button onclick="answer('Kůň')">Kůň</button>

    <div id="result"></div>
  </div>

  <div class="box" id="colorGame" style="display: none;">
    <p>Jaká je to barva?</p>

    <div id="colorCircle"></div>

    <button onclick="checkColor('Červená')">Červená</button>
    <button onclick="checkColor('Modrá')">Modrá</button>
    <button onclick="checkColor('Zelená')">Zelená</button>

    <div id="colorResult"></div>
  </div>

  <script>
    let score = 0;

    function addPoint() {
      score++;
      document.getElementById("score").innerText = score;
    }

    const animals = [
      { emoji: "🐶", correct: "Pes" },
      { emoji: "🐱", correct: "Kočka" },
      { emoji: "🐴", correct: "Kůň" }
    ];

    let currentAnimal = 0;

    function showAnimal() {
      document.getElementById("animal").innerText =
        animals[currentAnimal].emoji;
      document.getElementById("result").innerText = "";
    }

    function answer(choice) {
      if (choice === animals[currentAnimal].correct) {
        currentAnimal++;

        if (currentAnimal >= animals.length) {
          document.getElementById("animal").innerText = "🎉";
          document.getElementById("result").innerText =
            "Vyhrál jsi! Znáš všechna zvířata.";

          document.getElementById("colorGame").style.display = "block";
        } else {
          document.getElementById("result").innerText = "Správně!";
          setTimeout(showAnimal, 1000);
        }
      } else {
        document.getElementById("result").innerText = "Zkus to znovu 🙂";
      }
    }

    showAnimal();

    const colors = [
      { color: "red", correct: "Červená" },
      { color: "blue", correct: "Modrá" },
      { color: "green", correct: "Zelená" }
    ];

    let currentColor = 0;

    function showColor() {
      document.getElementById("colorCircle").style.background =
        colors[currentColor].color;
      document.getElementById("colorResult").innerText = "";
    }

    function checkColor(choice) {
      if (choice === colors[currentColor].correct) {
        currentColor++;

        if (currentColor >= colors.length) {
          document.getElementById("colorResult").innerText =
            "🎉 Super! Znáš všechny barvy!";
        } else {
          document.getElementById("colorResult").innerText = "Správně!";
          setTimeout(showColor, 1000);
        }
      } else {
        document.getElementById("colorResult").innerText =
          "Zkus to znovu 🙂";
      }
    }

    showColor();
  </script>

</body>
</html>
