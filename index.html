<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dětské hry zdarma</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(#87cefa, #dff5ff);
    min-height: 100vh;
    overflow-x: hidden;
    padding: 20px;
}

h1 {
    color: #ff5a5a;
    font-size: 60px;
    margin-bottom: 10px;
}

.subtitle {
    font-size: 30px;
    color: #333;
    margin-bottom: 30px;
}

.cloud {
    position: fixed;
    font-size: 60px;
    opacity: 0.8;
    pointer-events: none;
}

.cloud1 { top: 20px; left: 40px; }
.cloud2 { top: 80px; right: 60px; }

.butterfly {
    position: fixed;
    font-size: 45px;
    pointer-events: none;
}

.b1 { top: 180px; left: 60px; }
.b2 { top: 420px; right: 90px; }

.score-box {
    background: white;
    display: inline-block;
    padding: 12px 30px;
    border-radius: 20px;
    font-size: 36px;
    color: #00a651;
    font-weight: bold;
    box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    margin-bottom: 35px;
}

.box {
    background: white;
    max-width: 700px;
    margin: 0 auto 30px auto;
    padding: 35px;
    border-radius: 30px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.15);
}

.age-buttons {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 30px;
}

.age-button {
    border: none;
    border-radius: 25px;
    padding: 25px 35px;
    font-size: 30px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
    min-width: 180px;
}

.age-button:hover {
    transform: scale(1.05);
}

.yellow { background: #ffd93d; }
.green { background: #7ee081; }
.blue { background: #7ec8ff; }

button.answer {
    border: none;
    border-radius: 20px;
    padding: 18px 28px;
    margin: 10px;
    font-size: 28px;
    cursor: pointer;
    background: #ffd93d;
    transition: 0.2s;
}

button.answer:hover {
    transform: scale(1.05);
}

.question-image {
    font-size: 90px;
    margin: 20px 0;
}

.hidden {
    display: none;
}

.result {
    margin-top: 25px;
    font-size: 24px;
    color: green;
    font-weight: bold;
}
</style>
</head>
<body>

<div class="cloud cloud1">☁️</div>
<div class="cloud cloud2">☁️</div>
<div class="butterfly b1">🦋</div>
<div class="butterfly b2">🦋</div>

<h1>🎮 Dětské hry zdarma</h1>
<div class="subtitle">Vyber si svůj věk 😊</div>

<div class="score-box">
⭐ Body: <span id="score">0</span>
</div>

<div class="box" id="ageSelect">
    <h2>Kolik ti je let?</h2>

    <div class="age-buttons">
        <button class="age-button yellow" onclick="selectAge('small')">
            🧸<br>2–3 roky
        </button>

        <button class="age-button green" onclick="selectAge('middle')">
            🐻<br>4–5 let
        </button>

        <button class="age-button blue" onclick="selectAge('big')">
            🚀<br>6–7 let
        </button>
    </div>
</div>

<div class="box hidden" id="smallGames">
    <h2>🧸 Hry pro 2–3 roky</h2>
    <p>Jaké je to zvíře?</p>

    <div class="question-image">🐶</div>

    <button class="answer" onclick="correctSmall()">Pes</button>
    <button class="answer" onclick="wrong()">Kočka</button>
    <button class="answer" onclick="wrong()">Kůň</button>

    <div id="smallResult" class="result"></div>
</div>

<div class="box hidden" id="middleGames">
    <h2>🐻 Hry pro 4–5 let</h2>
    <p>Jaká je to barva?</p>

    <div class="question-image" style="color:green;">🟢</div>

    <button class="answer" onclick="wrong()">Modrá</button>
    <button class="answer" onclick="correctMiddle()">Zelená</button>
    <button class="answer" onclick="wrong()">Červená</button>

    <div id="middleResult" class="result"></div>
</div>

<div class="box hidden" id="bigGames">
    <h2>🚀 Hry pro 6–7 let</h2>
    <p>Kolik je 2 + 3 ?</p>

    <div class="question-image">➕</div>

    <button class="answer" onclick="wrong()">4</button>
    <button class="answer" onclick="correctBig()">5</button>
    <button class="answer" onclick="wrong()">6</button>

    <div id="bigResult" class="result"></div>
</div>

<script>
let score = 0;

function addPoint() {
    score++;
    document.getElementById("score").innerText = score;
}

function selectAge(age) {
    document.getElementById("smallGames").classList.add("hidden");
    document.getElementById("middleGames").classList.add("hidden");
    document.getElementById("bigGames").classList.add("hidden");

    if (age === "small") {
        document.getElementById("smallGames").classList.remove("hidden");
    }

    if (age === "middle") {
        document.getElementById("middleGames").classList.remove("hidden");
    }

    if (age === "big") {
        document.getElementById("bigGames").classList.remove("hidden");
    }
}

function correctSmall() {
    addPoint();
    document.getElementById("smallResult").innerText = "🎉 Správně! To je pes.";
}

function correctMiddle() {
    addPoint();
    document.getElementById("middleResult").innerText = "🎉 Správně! To je zelená.";
}

function correctBig() {
    addPoint();
    document.getElementById("bigResult").innerText = "🎉 Správně! 2 + 3 = 5.";
}

function wrong() {
    alert("Zkus to znovu 😊");
}
</script>

</body>
</html>
