<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dětské hry zdarma</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(#8fd3ff, #dff7ff);
      text-align: center;
      padding: 30px;
    }

    h1 {
      color: #ff5a5a;
      font-size: 50px;
      margin-bottom: 10px;
    }

    .intro {
      font-size: 24px;
      color: #333;
      margin-bottom: 40px;
    }

    p {
      font-size: 22px;
      color: #333;
    }

    .box {
      background: white;
      max-width: 500px;
      margin: 40px auto;
      padding: 30px;
      border-radius: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    button {
      background: #ffd93d;
      border: none;
      padding: 18px 30px;
      border-radius: 15px;
      font-size: 24px;
      cursor: pointer;
      margin: 5px;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      background: #ffcb05;
    }

    #score {
      margin-top: 20px;
      font-size: 40px;
      color: #00a651;
      font-weight: bold;
    }

    #animal {
      font-size: 60px;
      margin: 20px 0;
    }

    #result, #colorResult {
      margin-top: 20px;
      font-size: 28px;
      font-weight: bold;
      color: #007700;
    }

    #colorCircle {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin: 20px auto;
    }
  </style>
</head>
<body>

  <h1>🎮 Dětské hry zdarma</h1>

  <div class="intro">
    Vítej! Zahraj si hry a nauč se něco nového 😊
  </div>

  <div class="box">
    <p>Klikni na tlačítko a sbírej body!</p>

    <button onclick="addPoint()">Klikni sem 😊</button>

    <div id="score">0</div>
  </div>

  <div class="box">
    <p>Jaké je to zvíře?</p>

    <div id="animal">🐶</div>

    <button onclick="answer('Kočka')">Kočka</button>
    <button onclick="answer('Pes')">Pes</button>
    <button onclick="answer('Kůň')">Kůň</button>

    <div id="result"></div>
  </div>

  <div class="box">
    <p>Jaká je to barva?</p>

    <div id="colorCircle"></div>

    <button onclick="checkColor('Červená')">Červená</button>
    <button onclick="checkColor('Modrá')">Modrá</button>
    <button onclick="checkColor('Zelená')">Zelená</button>

    <div id="colorResult"></div>
  </div>

  <script>
    let score = 0;

    function addPoint() {
      score++;
      document.getElementById("score").innerText = score;
    }

    const animals = [
      { emoji: "🐶", correct: "Pes" },
      { emoji: "🐱", correct: "Kočka" },
      { emoji: "🐴", correct: "Kůň" }
    ];

    let current = 0;

    function showAnimal() {
      document.getElementById("animal").innerText = animals[current].emoji;
      document.getElementById("result").innerText = "";
    }

    function answer(choice) {
      if (choice === animals[current].correct) {
        document.getElementById("result").innerText = "Správně!";

        current++;

        if (current >= animals.length) {
          document.getElementById("animal").innerText = "🎉";
          document.getElementById("result").innerText =
            "Vyhrál jsi! Znáš všechna zvířata.";
        } else {
          setTimeout(showAnimal, 1000);
        }
      } else {
        document.getElementById("result").innerText = "Zkus to znovu 🙂";
      }
    }

    showAnimal();

    const colors = [
      { color: "red", correct: "Červená" },
      { color: "blue", correct: "Modrá" },
      { color: "green", correct: "Zelená" }
    ];

    let currentColor = 0;

    function showColor() {
      document.getElementById("colorCircle").style.background =
        colors[currentColor].color;
      document.getElementById("colorResult").innerText = "";
    }

    function checkColor(choice) {
      if (choice === colors[currentColor].correct) {
        document.getElementById("colorResult").innerText = "Správně!";

        currentColor++;

        if (currentColor >= colors.length) {
          document.getElementById("colorResult").innerText =
            "🎉 Znáš všechny barvy!";
        } else {
          setTimeout(showColor, 1000);
        }
      } else {
        document.getElementById("colorResult").innerText =
          "Zkus to znovu 🙂";
      }
    }

    showColor();
  </script>

</body>
</html>
